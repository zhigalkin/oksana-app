<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оксана — Голосовий помічник</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #1DB954;
    --accent2: #FFD700;
    --text: #f0f0f0;
    --text2: #888;
    --glow: rgba(29, 185, 84, 0.3);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(29,185,84,0.08) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
    animation: drift 8s ease-in-out infinite alternate;
  }
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    pointer-events: none;
    animation: drift 10s ease-in-out infinite alternate-reverse;
  }

  @keyframes drift {
    from { transform: translate(0,0); }
    to { transform: translate(40px, 30px); }
  }

  /* SETUP SCREEN */
  #setup-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    gap: 32px;
    padding: 24px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 40px;
    max-width: 480px;
    width: 100%;
  }

  .setup-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
  }

  .setup-sub {
    text-align: center;
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .setup-field {
    margin-bottom: 16px;
  }

  .setup-field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .setup-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', monospace;
    outline: none;
    transition: border-color 0.2s;
  }

  .setup-field input:focus {
    border-color: var(--accent);
  }

  .setup-field .hint {
    font-size: 11px;
    color: var(--text2);
    margin-top: 6px;
  }

  .setup-field .hint a {
    color: var(--accent);
    text-decoration: none;
  }

  .lang-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .lang-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }

  .lang-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  .start-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .start-btn:hover {
    background: #1ed760;
    transform: translateY(-1px);
  }

  /* MAIN APP */
  #app {
    display: none;
    height: 100vh;
    grid-template-rows: 60px 1fr 180px;
    grid-template-columns: 280px 1fr;
    grid-template-areas:
      "header header"
      "sidebar main"
      "player player";
  }

  #app.visible {
    display: grid;
  }

  /* HEADER */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.6; }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .lang-switch {
    display: flex;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .lang-switch button {
    padding: 5px 10px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .lang-switch button.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* SIDEBAR */
  aside {
    grid-area: sidebar;
    background: var(--surface);
    border-right: 1px solid rgba(255,255,255,0.05);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .sidebar-section h3 {
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    padding: 0 8px;
  }

  .quick-cmd {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cmd-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    font-family: 'Inter', sans-serif;
    width: 100%;
  }

  .cmd-btn:hover {
    background: var(--surface2);
    color: var(--accent);
  }

  .cmd-btn .icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  /* MAIN CHAT AREA */
  main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: msg-in 0.3s ease;
    max-width: 80%;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: var(--surface2);
  }

  .msg.assistant .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #0d9944);
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 100%;
  }

  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    color: #000;
    border-bottom-right-radius: 4px;
  }

  /* Spotify card in chat */
  .spotify-card {
    background: var(--surface2);
    border: 1px solid rgba(29,185,84,0.3);
    border-radius: 12px;
    padding: 14px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .spotify-card img {
    width: 56px; height: 56px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--surface);
  }

  .spotify-card-info { flex: 1; min-width: 0; }

  .spotify-card-title {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .spotify-card-artist {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }

  .spotify-play-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .spotify-play-btn:hover {
    transform: scale(1.1);
    background: #1ed760;
  }

  /* INPUT AREA */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    background: var(--bg);
  }

  #msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--text2); }

  .mic-btn, .send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .mic-btn {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
  }

  .mic-btn:hover, .mic-btn.active {
    background: #ff4444;
    border-color: #ff4444;
    color: white;
    animation: mic-pulse 1s ease-in-out infinite;
  }

  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
  }

  .send-btn {
    background: var(--accent);
    color: #000;
  }

  .send-btn:hover {
    background: #1ed760;
    transform: translateY(-1px);
  }

  /* PLAYER */
  #player {
    grid-area: player;
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .player-track {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  #track-art {
    width: 56px; height: 56px;
    border-radius: 8px;
    background: var(--surface2);
    object-fit: cover;
    flex-shrink: 0;
  }

  .track-meta { flex: 1; min-width: 0; }

  #track-name {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #track-artist {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.15s;
    padding: 6px;
    border-radius: 50%;
  }

  .ctrl-btn:hover { color: var(--text); transform: scale(1.1); }

  #play-pause {
    width: 44px; height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  #play-pause:hover { background: #1ed760; transform: scale(1.05); }

  .player-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--text2);
  }

  #progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
  }

  .player-vol {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }

  #volume-slider {
    width: 80px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--text2);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* Scrollbar */
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  /* No spotify warning */
  .warning-banner {
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--accent2);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  /* Wake word indicator */
  #wake-indicator {
    position: fixed;
    bottom: 200px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(19,19,26,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 50;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  #wake-indicator.listening {
    border-color: rgba(29,185,84,0.4);
    color: var(--accent);
  }

  #wake-indicator.active {
    border-color: rgba(255,68,68,0.6);
    color: #ff6b6b;
    background: rgba(255,68,68,0.1);
  }

  .wake-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text2);
    flex-shrink: 0;
  }

  #wake-indicator.listening .wake-dot {
    background: var(--accent);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }

  #wake-indicator.active .wake-dot {
    background: #ff6b6b;
    animation: pulse-dot 0.6s ease-in-out infinite;
  }

  .always-on-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    background: var(--surface2);
    color: var(--text2);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    width: 100%;
    margin-top: 8px;
  }

  .always-on-toggle.on {
    background: rgba(29,185,84,0.15);
    border: 1px solid rgba(29,185,84,0.3);
    color: var(--accent);
  }

  .toggle-dot {
    width: 28px; height: 16px;
    border-radius: 8px;
    background: var(--surface);
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .always-on-toggle.on .toggle-dot {
    background: var(--accent);
  }

  .toggle-dot::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: white;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }

  .always-on-toggle.on .toggle-dot::after {
    left: 14px;
  }

  @media (max-width: 768px) {
    #app.visible { grid-template-columns: 1fr; grid-template-rows: 60px 1fr 160px; grid-template-areas: "header" "main" "player"; }
    aside { display: none; }
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">🌻 ОКСАНА</div>
    <div class="setup-sub">Голосовий помічник зі Spotify</div>

    <div class="lang-toggle">
      <button class="lang-btn active" onclick="selectLang('uk', this)">🇺🇦 Українська</button>
      <button class="lang-btn" onclick="selectLang('ru', this)">🇷🇺 Русский</button>
    </div>

    <div class="setup-field">
      <label>Groq API Key</label>
      <input type="password" id="setup-groq" placeholder="gsk_...">
      <div class="hint">Безкоштовно на <a href="https://console.groq.com" target="_blank">console.groq.com</a></div>
    </div>

    <div class="setup-field">
      <label>Spotify Client ID</label>
      <input type="text" id="setup-spotify-id" placeholder="32-символьний Client ID">
      <div class="hint"><a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com</a> → Create App → Client ID</div>
    </div>

    <div class="setup-field">
      <label>Spotify Redirect URI (вкажіть в Spotify App)</label>
      <input type="text" id="setup-redirect" readonly style="opacity:0.6; cursor:default;">
      <div class="hint">Скопіюйте це у Spotify App Settings → Redirect URIs</div>
    </div>

    <button class="start-btn" onclick="startApp()">ЗАПУСТИТИ ОКСАНУ ▶</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      ОКСАНА
    </div>
    <div class="header-right">
      <div class="lang-switch">
        <button id="lang-uk" class="active" onclick="switchLang('uk')">🇺🇦 УКР</button>
        <button id="lang-ru" onclick="switchLang('ru')">🇷🇺 РУС</button>
      </div>
    </div>
  </header>

  <aside>
    <div class="sidebar-section">
      <h3 id="sidebar-title">Швидкі команди</h3>
      <div class="quick-cmd" id="quick-cmds"></div>
    </div>
    <div class="sidebar-section">
      <h3 id="sidebar-spotify-title">Музика</h3>
      <div class="quick-cmd" id="music-cmds"></div>
    </div>
    <div class="sidebar-section">
      <h3 id="sidebar-settings-title">Налаштування</h3>
      <button class="always-on-toggle" id="always-on-btn" onclick="toggleAlwaysOn()">
        <div class="toggle-dot"></div>
        <span id="always-on-label">Постійне прослуховування</span>
      </button>
    </div>
  </aside>

  <!-- Wake word indicator -->
  <div id="wake-indicator">
    <div class="wake-dot"></div>
    <span id="wake-text">Скажіть "Оксана"</span>
  </div>

  <main>
    <div id="chat"></div>
    <div class="input-area">
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Голосовий ввід">🎤</button>
      <textarea id="msg-input" placeholder="Напишіть або скажіть щось..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </main>

  <div id="player">
    <div class="player-track">
      <img id="track-art" src="" alt="">
      <div class="track-meta">
        <div id="track-name">—</div>
        <div id="track-artist">—</div>
      </div>
      <div class="player-vol">

async function generateCodeVerifier() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function exchangeCodeForToken(code, clientId) {
  const verifier = localStorage.getItem('spotify_verifier');
  if (!verifier) return null;
  const redirectUri = window.location.origin + window.location.pathname;
  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: clientId,
        grant_type: 'authorization_code',
        code,
        redirect_uri: redirectUri,
        code_verifier: verifier
      })
    });
    const data = await res.json();
    localStorage.removeItem('spotify_verifier');
    return data.access_token || null;
  } catch(e) {
    console.error('Token exchange error:', e);
    return null;
  }
}

async function authWithSpotifyPKCE() {
  const verifier = await generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem('spotify_verifier', verifier);
  const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
  const scopes = encodeURIComponent('streaming user-read-playback-state user-modify-playback-state user-read-currently-playing user-read-email user-read-private');
  window.location.href = `https://accounts.spotify.com/authorize?client_id=${spotifyClientId}&response_type=code&redirect_uri=${redirectUri}&scope=${scopes}&code_challenge_method=S256&code_challenge=${challenge}`;
}

// ── GROQ AI ───────────────────────────────────────────────────────
async function askGroq(userMsg) {
  history.push({ role: 'user', content: userMsg });
  if (history.length > 20) history = history.slice(-20);

  const messages = [
    { role: 'system', content: T[lang].system },
    ...history
  ];

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages, max_tokens: 500, temperature: 0.7 })
  });

  const data = await res.json();
  const answer = data.choices?.[0]?.message?.content || '...';
  history.push({ role: 'assistant', content: answer });
  return answer;
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  await sendText(text);
}

async function sendText(text) {
  addMsg('user', text);
  addTyping();

  try {
    const answer = await askGroq(text);
    removeTyping();

    // Check if it's a Spotify action
    try {
      const json = JSON.parse(answer.match(/\{.*\}/s)?.[0] || '{}');
      if (json.action === 'spotify_search') {
        if (!spotifyToken) {
          addMsg('assistant', T[lang].noSpotify);
        } else {
          addMsg('assistant', `🔍 ${T[lang].found}: "${json.query}"...`);
          await spotifySearch(json.query, json.type || 'track');
        }
        return;
      }
    } catch(e) {}

    addMsg('assistant', answer);
  } catch(e) {
    removeTyping();
    addMsg('assistant', '❌ Помилка. Перевірте Groq API Key.');
  }
}

function initSpotify() {
  window.onSpotifyWebPlaybackSDKReady = () => {
    spotifyPlayer = new Spotify.Player({
      name: 'Оксана Player',
      getOAuthToken: cb => cb(spotifyToken),
      volume: 0.8
    });

    spotifyPlayer.addListener('ready', ({ device_id }) => {
      deviceId = device_id;
      console.log('Spotify ready, device:', device_id);
    });

    spotifyPlayer.addListener('player_state_changed', state => {
      if (!state) return;
      isPlaying = !state.paused;
      document.getElementById('play-pause').textContent = isPlaying ? '⏸' : '▶';
      trackDuration = state.duration;
      trackPosition = state.position;

      const track = state.track_window?.current_track;
      if (track) {
        currentTrack = track;
        document.getElementById('track-name').textContent = track.name;
        document.getElementById('track-artist').textContent = track.artists.map(a => a.name).join(', ');
        const img = track.album?.images?.[0]?.url;
        if (img) document.getElementById('track-art').src = img;
      }

      updateProgress();
    });

    spotifyPlayer.connect();
  };

  const script = document.createElement('script');
  script.src = 'https://sdk.scdn.co/spotify-player.js';
  document.head.appendChild(script);
}

async function spotifySearch(query, type = 'track') {
  try {
    const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=${type}&limit=5`, {
      headers: { 'Authorization': `Bearer ${spotifyToken}` }
    });
    const data = await res.json();

    const items = data.tracks?.items || data.artists?.items || data.playlists?.items || [];

    if (!items.length) {
      addMsg('assistant', T[lang].notFound);
      return;
    }

    const first = items[0];
    const uri = first.uri;
    const name = first.name;
    const artist = first.artists?.[0]?.name || '';
    const img = first.album?.images?.[0]?.url || first.images?.[0]?.url || '';

    // Play it
    if (deviceId) {
      const body = type === 'artist' || type === 'playlist'
        ? { context_uri: uri }
        : { uris: items.filter(i => i.uri).map(i => i.uri) };

      await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${spotifyToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }

    // Show card
    const card = `
      <div class="spotify-card">
        <img src="${img}" alt="" onerror="this.style.display='none'">
        <div class="spotify-card-info">
          <div class="spotify-card-title">${name}</div>
          <div class="spotify-card-artist">${artist}</div>
        </div>
        <button class="spotify-play-btn" onclick="window.open('${first.external_urls?.spotify}','_blank')">🎵</button>
      </div>`;

    addMsg('assistant', `✅ ${lang === 'uk' ? 'Граю' : 'Играю'}: <b>${name}</b>`, card);

  } catch(e) {
    console.error(e);
    addMsg('assistant', T[lang].notFound);
  }
}

function togglePlay() {
  if (!spotifyPlayer) return;
  spotifyPlayer.togglePlay();
}

function prevTrack() {
  if (!spotifyPlayer) return;

}

function nextTrack() {
  if (!spotifyPlayer) return;
  spotifyPlayer.nextTrack();
}

function setVolume(val) {
  if (!spotifyPlayer) return;
  spotifyPlayer.setVolume(val / 100);
}

function seekTo(e) {
  if (!spotifyPlayer || !trackDuration) return;
  const bar = document.getElementById('progress-bar');
  const ratio = e.offsetX / bar.offsetWidth;
  spotifyPlayer.seek(ratio * trackDuration);
}

function updateProgress() {
  clearInterval(progressInterval);
  if (!isPlaying) return;

  progressInterval = setInterval(() => {
    trackPosition += 1000;
    if (trackPosition > trackDuration) { clearInterval(progressInterval); return; }
    const pct = (trackPosition / trackDuration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-cur').textContent = formatTime(trackPosition);
    document.getElementById('time-total').textContent = formatTime(trackDuration);
  }, 1000);
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── VOICE RECOGNITION ────────────────────────────────────────────
function initVoiceRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('mic-btn').style.opacity = '0.3'; return; }

  // Main recognition — for commands
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = lang === 'uk' ? 'uk-UA' : 'ru-RU';

  recognition.onresult = e => {
    let final = '';
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (interim) document.getElementById('msg-input').value = interim;
    if (final) {
      document.getElementById('msg-input').value = final;
      stopMic();
      sendMsg();
    }
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('active');
    // If always-on mode — restart wake word listener
    if (alwaysOn && !awaitingCommand) startWakeListener();
  };
  recognition.onerror = e => {
    console.log('Recognition error:', e.error);
    isListening = false;
    document.getElementById('mic-btn').classList.remove('active');
    if (alwaysOn && !awaitingCommand) setTimeout(startWakeListener, 1000);
  };

  // Load always-on state
  alwaysOn = localStorage.getItem('oksana_always_on') === 'true';
  if (alwaysOn) {
    document.getElementById('always-on-btn').classList.add('on');
    setTimeout(startWakeListener, 500);
  }
  updateWakeUI();
}

// ── WAKE WORD ─────────────────────────────────────────────────────
function startWakeListener() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR || !alwaysOn || isListening) return;

  wakeRecognition = new SR();
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = true;
  wakeRecognition.lang = lang === 'uk' ? 'uk-UA' : 'ru-RU';

  const wakeWords = ['оксана', 'oksana', 'оксано', 'оксанка'];

  wakeRecognition.onresult = e => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const text = e.results[i][0].transcript.toLowerCase().trim();
      const hasWakeWord = wakeWords.some(w => text.includes(w));
      if (hasWakeWord) {
        wakeRecognition.stop();
        triggerWakeWord();
        return;
      }
    }
  };

  wakeRecognition.onend = () => {
    // Restart if still in always-on mode
    if (alwaysOn && !isListening && !awaitingCommand) {
      setTimeout(startWakeListener, 300);
    }
  };

  wakeRecognition.onerror = e => {
    if (e.error === 'no-speech' || e.error === 'aborted') {
      if (alwaysOn && !isListening) setTimeout(startWakeListener, 500);
    }
  };

  try { wakeRecognition.start(); } catch(e) {}
  updateWakeUI('listening');
}

function triggerWakeWord() {
  awaitingCommand = true;
  updateWakeUI('active');

  // Visual + sound feedback
  document.getElementById('mic-btn').classList.add('active');

  // Show "слухаю" in chat
  const indicator = document.getElementById('wake-indicator');
  document.getElementById('wake-text').textContent = lang === 'uk' ? '🎤 Слухаю...' : '🎤 Слушаю...';

  // Start listening for command
  if (!recognition) return;
  recognition.lang = lang === 'uk' ? 'uk-UA' : 'ru-RU';

  const commandRecog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  commandRecog.continuous = false;
  commandRecog.interimResults = true;
  commandRecog.lang = lang === 'uk' ? 'uk-UA' : 'ru-RU';
  commandRecog.maxAlternatives = 1;

  commandRecog.onresult = e => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (interim) document.getElementById('msg-input').value = interim;
    if (final) {
      document.getElementById('msg-input').value = final;
      commandRecog.stop();
    }
  };

  commandRecog.onend = () => {
    awaitingCommand = false;
    isListening = false;
    document.getElementById('mic-btn').classList.remove('active');
    updateWakeUI('listening');
    const text = document.getElementById('msg-input').value.trim();
    if (text) sendMsg();
    if (alwaysOn) setTimeout(startWakeListener, 800);
  };

  commandRecog.onerror = () => {
    awaitingCommand = false;
    isListening = false;
    document.getElementById('mic-btn').classList.remove('active');
    updateWakeUI('listening');
    if (alwaysOn) setTimeout(startWakeListener, 800);
  };

  try {
    isListening = true;
    commandRecog.start();
  } catch(e) {
    awaitingCommand = false;
    isListening = false;
  }
}

function updateWakeUI(state = '') {
  const indicator = document.getElementById('wake-indicator');
  if (!indicator) return;
  indicator.className = state ? `${state}` : '';

  const texts = {
    uk: { listening: 'Скажіть "Оксана"...', active: '🎤 Слухаю команду...' },
    ru: { listening: 'Скажите "Оксана"...', active: '🎤 Слушаю команду...' }
  };

  if (alwaysOn) {
    indicator.style.display = 'flex';
    document.getElementById('wake-text').textContent = state === 'active'
      ? texts[lang].active
      : texts[lang].listening;
  } else {
    indicator.style.display = 'none';
  }
}

function toggleAlwaysOn() {
  alwaysOn = !alwaysOn;
  localStorage.setItem('oksana_always_on', alwaysOn);
  const btn = document.getElementById('always-on-btn');
  btn.classList.toggle('on', alwaysOn);

  if (alwaysOn) {
    startWakeListener();
  } else {
    if (wakeRecognition) { try { wakeRecognition.stop(); } catch(e) {} }
    updateWakeUI('');
  }
}

function toggleMic() {
  if (alwaysOn) {
    // Manual activation while in always-on mode
    if (wakeRecognition) { try { wakeRecognition.stop(); } catch(e) {} }
    triggerWakeWord();
  } else {
    if (isListening) stopMic();
    else startMic();
  }
}

function startMic() {
  if (!recognition) return;
  recognition.lang = lang === 'uk' ? 'uk-UA' : 'ru-RU';
  try { recognition.start(); } catch(e) {}
  isListening = true;
  document.getElementById('mic-btn').classList.add('active');
}

function stopMic() {
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  isListening = false;
  document.getElementById('mic-btn').classList.remove('active');
}

// Spacebar shortcut
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    toggleMic();
  }
});
</script>
</body>
</html>
